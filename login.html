<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 正版查询系统</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .login-card p {
            color: #888;
            margin-bottom: 30px;
        }
        .form-control {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #ccc;
            background-color: white;
        }
        .btn-login {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #333;
            color: white;
        }
        .alert {
            display: none;
            margin-top: 20px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .back-home {
            display: inline-block;
            margin-top: 25px;
            color: #999;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>后台登录</h2>
        <p>正版查询系统管理员中心</p>
        
        <form id="loginForm">
            <input type="text" id="username" class="form-control" placeholder="用户名" required autocomplete="username">
            <input type="password" id="password" class="form-control" placeholder="密码" required autocomplete="current-password">
            <button type="submit" class="btn btn-login">进入后台</button>
        </form>

        <div id="errorMsg" class="alert alert-danger"></div>

        <a href="index.html" class="back-home">返回网站首页</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('./api/admin/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.innerText = data.error || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = '服务器连接失败';
                errorMsg.style.display = 'block';
            }
        });

        // 检查是否已经登录
        window.onload = async () => {
            try {
                const res = await fetch('./api/admin/check_auth.php');
                if (res.ok) window.location.href = 'admin.html';
            } catch (e) {}
        };
    </script>
</body>
</html>
